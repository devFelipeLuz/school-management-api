spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/escola_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:minha-chave-super-chata-com-no-minimo-32-caracteres}
  expiration: 3600
